name: Trigger Automation Suite

on:
  push:
    branches:
      - MKQA

jobs:
  check-and-trigger:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check commit message for 'release'
        id: check_commit
        shell: powershell
        run: |
          $COMMIT_MESSAGE = git log -1 --pretty=%B
          Write-Output "Commit message: $COMMIT_MESSAGE"
          
          if ($COMMIT_MESSAGE -imatch 'release') {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "release_found=true"
            Write-Output "✅ 'release' keyword found in commit message"
          } else {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "release_found=false"
            Write-Output "❌ 'release' keyword NOT found in commit message"
          }
      
      - name: Log commit information
        if: steps.check_commit.outputs.release_found == 'true'
        shell: powershell
        run: |
          Write-Output "=========================================="
          Write-Output "Triggering Automation Suite"
          Write-Output "=========================================="
          Write-Output "Commit SHA: ${{ github.sha }}"
          Write-Output "Branch: ${{ github.ref }}"
          Write-Output "Actor: ${{ github.actor }}"
          Write-Output "=========================================="
      
      - name: Trigger Automation Suite
        if: steps.check_commit.outputs.release_found == 'true'
        shell: powershell
        run: |
          $pat = "${{ secrets.AUTOMATION_TRIGGER_TOKEN }}"
          $headers = @{"Authorization" = "token $pat"}
          
          $commitMessage = git log -1 --pretty=%B
          
          $body = @{
            event_type = "automation-trigger"
            client_payload = @{
              trigger_source = "dev-repo"
              branch = "${{ github.ref }}"
              commit_sha = "${{ github.sha }}"
              commit_message = $commitMessage
              triggered_by = "${{ github.actor }}"
            }
          } | ConvertTo-Json -Depth 10
          
          Write-Output "Request Body: $body"
          
          try {
            $response = Invoke-WebRequest `
              -Uri "https://api.github.com/repos/MillerKnoll-Digital/sfb2b-automation/dispatches" `
              -Headers $headers `
              -Method POST `
              -ContentType "application/json" `
              -Body $body `
              -ErrorAction Stop
            
            Write-Output "Response Status: $($response.StatusCode)"
            Write-Output "✅ Trigger sent successfully!"
          } catch {
            Write-Output "❌ Error sending trigger:"
            Write-Output $_.Exception.Message
            exit 1
          }
      
      - name: Automation Trigger Successful
        if: steps.check_commit.outputs.release_found == 'true'
        shell: powershell
        run: |
          Write-Output "🚀 Automation suite has been triggered successfully!"